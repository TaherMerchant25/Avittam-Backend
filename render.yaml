services:
  # Python FastAPI Backend
  - type: web
    name: avittam-backend
    env: python
    region: singapore
    plan: free
    branch: main
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: DEBUG
        value: false
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRATION_HOURS
        value: 24
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: RATE_LIMIT_PER_MINUTE
        value: 60
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: STREAM_CHAT_API_KEY
        sync: false
      - key: STREAM_CHAT_API_SECRET
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false

  # Keep-alive cron job — pings the backend every 10 minutes to prevent free-tier sleep
  - type: cron
    name: avittam-keepalive
    env: python
    region: singapore
    plan: free
    schedule: "*/10 * * * *"
    buildCommand: "echo 'keepalive build'"
    startCommand: "curl -s https://avittam-backend-yr1z.onrender.com/api/health && echo 'Backend is alive'"
